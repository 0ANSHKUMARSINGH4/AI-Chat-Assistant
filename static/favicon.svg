<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b111e"/>
      <stop offset="100%" stop-color="#141d30"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  <rect width="62" height="62" x="1" y="1" rx="15" fill="none" stroke="rgba(99, 102, 241, 0.4)" stroke-width="1.5"/>
  
  <!-- Glowing Sun / RAYS Emblem -->
  <g transform="translate(32, 32)" filter="url(#glow)">
    <!-- Sun Core -->
    <circle r="9" fill="url(#sunGrad)"/>
    
    <!-- 8 Sun Rays -->
    <g stroke="url(#sunGrad)" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-14" x2="0" y2="-20" />
      <line x1="0" y1="14" x2="0" y2="20" />
      <line x1="-14" y1="0" x2="-20" y2="0" />
      <line x1="14" y1="0" x2="20" y2="0" />
      <line x1="-9.9" y1="-9.9" x2="-14.1" y2="-14.1" />
      <line x1="9.9" y1="9.9" x2="14.1" y2="14.1" />
      <line x1="-9.9" y1="9.9" x2="-14.1" y2="14.1" />
      <line x1="9.9" y1="-9.9" x2="14.1" y2="-14.1" />
    </g>
  </g>
</svg>
